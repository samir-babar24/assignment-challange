<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Links Profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #141414, #1f1f1f);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
    background: #1f1f1f;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    animation: fadeIn 1s ease-in-out;
}

/* Profile Image */
.profile-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 15px;
    transition: 0.3s;
}

.profile-img:hover {
    transform: scale(1.1) rotate(5deg);
}

/* Text */
h1 {
    font-size: 22px;
    margin-bottom: 5px;
}

.bio {
    color: #aaa;
    margin-bottom: 20px;
}

/* Links */
.links {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    background: #333;
    padding: 12px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

/* Icons */
.icon {
    width: 20px;
    height: 20px;
}

/* Hover + Click Effects */
.link:hover,
.link:focus {
    background: #00ff88;
    color: black;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
}

.link:active {
    transform: scale(0.95);
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>

<div class="container">
    <img src="samir.png" alt="profile" class="profile-img">

    <h1>Samir Babar</h1>
    <p class="bio">
        AI/ML Enthusiast <br>
        TY Computer Engineering Student
    </p>

    <div class="links">

        <a href="https://github.com/samir-babar24" target="_blank" class="link">
            <img src="github-sign.png" class="icon"> GitHub
        </a>

        <a href="https://www.codechef.com/users/samir_babar" target="_blank" class="link">
            <img src="code.png" class="icon"> CodeChef
        </a>

        <a href="https://www.instagram.com" target="_blank" class="link">
            <img src="instagram.png" class="icon"> Instagram
        </a>

        <a href="https://www.youtube.com/@samirbabar573" target="_blank" class="link">
            <img src="youtube.png" class="icon"> YouTube
        </a>

        <a href="https://twitter.com" target="_blank" class="link">
            <img src="twitter.png" class="icon"> Twitter
        </a>

        <a href="https://facebook.com" target="_blank" class="link">
            <img src="facebook.png" class="icon"> Facebook
        </a>


        <a href="mailto:samirbabar0@gmail.com" class="link">
            <img src="gmail.png" class="icon"> Email
        </a>

    </div>
</div>

</body>
</html>
